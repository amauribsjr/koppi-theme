# Koppi theme for Starship
#
# Option 1 — set STARSHIP_CONFIG to point directly to this file:
#   export STARSHIP_CONFIG="$HOME/.config/starship/koppi.toml"
#
# Option 2 — copy the contents into your existing ~/.config/starship.toml.
#
# Requires a Nerd Font for the separator glyphs.

"$schema" = "https://starship.rs/config-schema.json"

format = """
[](fg:#383838)\
$os\
$username\
[](bg:#434343 fg:#383838)\
$directory\
[](fg:#434343 bg:#535353)\
$git_branch\
$git_status\
[](fg:#535353 bg:#2e2e2e)\
$fill\
$cmd_duration\
$line_break\
$character"""

[os]
disabled        = false
style           = "bg:#383838 fg:#d4b048"

[os.symbols]
NixOS = " "
Linux = " "

[username]
show_always = true
style_user  = "bg:#383838 fg:#909090"
style_root  = "bg:#383838 fg:#c45a5a"
format      = "[ $user ]($style)"

[directory]
style            = "bg:#434343 fg:#e8e8e8"
format           = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"~" = " ~"

[git_branch]
symbol = " "
style  = "bg:#535353 fg:#d4b048"
format = "[ $symbol$branch ]($style)"

[git_status]
style           = "bg:#535353 fg:#e8e8e8"
format          = "[$all_status$ahead_behind ]($style)"
conflicted      = "󰩌 "
ahead           = "⇡${count} "
behind          = "⇣${count} "
diverged        = "⇕⇡${ahead_count}⇣${behind_count} "
up_to_date      = ""
untracked       = "? "
stashed         = " "
modified        = "! "
staged          = "+ "
renamed         = "» "
deleted         = "✘ "

[fill]
symbol = " "

[cmd_duration]
min_time          = 500
style             = "fg:#787878"
format            = "[ $duration]($style) "

[character]
success_symbol = "[❯](fg:#d4b048)"
error_symbol   = "[❯](fg:#b54a4a)"
vimcmd_symbol  = "[❮](fg:#5a8f6a)"

[rust]
symbol = " "
style  = "fg:#d4b048"
format = "[ $symbol$version ]($style)"

[nix_shell]
symbol   = " "
style    = "fg:#5a8f6a"
format   = "[ $symbol$state ]($style)"
impure_msg   = "impure"
pure_msg     = "pure"

[python]
symbol = " "
style  = "fg:#909090"
format = "[ $symbol$version ]($style)"

[nodejs]
symbol = " "
style  = "fg:#6aa07a"
format = "[ $symbol$version ]($style)"

[memory_usage]
disabled  = false
threshold = 70
symbol    = "󰍛 "
style     = "fg:#c4924a"
format    = "[ $symbol${ram} ]($style)"