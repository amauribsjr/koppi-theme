# Koppi theme for tmux
#
# Source from your ~/.tmux.conf or ~/.config/tmux/tmux.conf:
#   source-file /path/to/ports/tmux/koppi.conf

# ── Pane borders ─────────────────────────────────────────────────
set -g pane-border-style        "fg=#535353"
set -g pane-active-border-style "fg=#d4b048"

# ── Messages ─────────────────────────────────────────────────────
set -g message-style        "fg=#e8e8e8,bg=#383838"
set -g message-command-style "fg=#d4b048,bg=#383838"

# ── Mode (copy mode, search) ─────────────────────────────────────
set -g mode-style "fg=#2e2e2e,bg=#d4b048"

# ── Status bar ───────────────────────────────────────────────────
set -g status                   "on"
set -g status-position          "bottom"
set -g status-justify           "left"
set -g status-style             "fg=#e8e8e8,bg=#383838"
set -g status-left-length       "60"
set -g status-right-length      "80"

# Left: session name
set -g status-left \
  "#[fg=#2e2e2e,bg=#d4b048,bold] #S #[fg=#d4b048,bg=#535353]#[fg=#e8e8e8,bg=#535353] #I:#P #[fg=#535353,bg=#383838]"

# Right: host · date · time
set -g status-right \
  "#[fg=#535353,bg=#383838]#[fg=#909090,bg=#535353] %d %b #[fg=#d4b048,bg=#535353]#[fg=#2e2e2e,bg=#d4b048,bold] %H:%M "

# ── Windows ──────────────────────────────────────────────────────
set -g window-status-style          "fg=#909090,bg=#383838"
set -g window-status-format         " #I:#W "

set -g window-status-current-style  "fg=#2e2e2e,bg=#d4b048,bold"
set -g window-status-current-format " #I:#W "

set -g window-status-activity-style "fg=#c4924a,bg=#383838"
set -g window-status-bell-style     "fg=#b54a4a,bg=#383838,bold"
set -g window-status-separator      ""